<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DMT Express — Výsledek | ePACE</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --accent: #FAD232;
  --accent-glow: rgba(250,210,50,0.20);
  --grey-dark: #1E2433;
  --grey-mid: #2a3040;
  --grey-card: #222838;
  --text-on-dark: #E8ECF4;
  --text-muted: #9AA3B5;
  --border-dark: rgba(255,255,255,0.10);
  --tier-I:   #f87171;
  --tier-II:  #fbbf24;
  --tier-III: #4ade80;
  --tier-IV:  #60a5fa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--grey-dark);
  color: var(--text-on-dark);
  min-height: 100vh;
}
h1,h2,h3,h4 { font-family: 'Poppins', sans-serif; }

/* ── HEADER ── */
.dash-header {
  background: rgba(30,36,51,0.97);
  border-bottom: 1px solid var(--border-dark);
  padding: 0 2rem;
  height: 62px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.dash-logo { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 1.3rem; color: var(--text-on-dark); letter-spacing: -0.03em; }
.dash-logo span { color: var(--accent); }
.dash-header-right { display: flex; gap: 1rem; align-items: center; }
.btn-share {
  background: transparent; border: 1.5px solid var(--border-dark);
  color: var(--text-muted); font-family: 'Poppins', sans-serif;
  font-size: 0.82rem; font-weight: 600; padding: 0.45rem 1.1rem;
  border-radius: 6px; cursor: pointer; transition: all 0.2s;
}
.btn-share:hover { border-color: var(--accent); color: var(--accent); }
.btn-cta {
  background: var(--accent); color: #1E2433;
  font-family: 'Poppins', sans-serif; font-size: 0.82rem; font-weight: 700;
  padding: 0.45rem 1.2rem; border-radius: 6px; border: none; cursor: pointer;
  text-decoration: none; transition: all 0.2s;
}
.btn-cta:hover { background: #ffe066; }

/* ── LAYOUT ── */
.dash-container { max-width: 900px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

/* ── TOP BAND ── */
.dash-top {
  display: grid; grid-template-columns: 1fr auto; gap: 2rem;
  align-items: start; margin-bottom: 2rem;
}
.dash-meta { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.5rem; }
.dash-url { font-size: 0.9rem; color: var(--text-on-dark); font-weight: 500; }
.dash-date { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.25rem; }

/* ── TIER HERO ── */
.tier-hero {
  display: flex; align-items: center; gap: 1.5rem;
  background: var(--grey-card);
  border: 2px solid var(--border-dark);
  border-radius: 16px;
  padding: 1.75rem 2rem;
  margin-bottom: 1.5rem;
  position: relative; overflow: hidden;
}
.tier-hero::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--tier-color, var(--accent));
}
.tier-numeral {
  font-family: 'Poppins', sans-serif;
  font-size: 4rem; font-weight: 800;
  color: var(--tier-color, var(--accent));
  line-height: 1; flex-shrink: 0;
  text-shadow: 0 0 40px var(--tier-glow, var(--accent-glow));
}
.tier-info { flex: 1; }
.tier-label {
  font-family: 'Poppins', sans-serif;
  font-size: 1.5rem; font-weight: 700;
  color: var(--text-on-dark); margin-bottom: 0.25rem;
}
.tier-sublabel {
  font-size: 0.88rem; color: var(--text-muted); margin-bottom: 0.5rem;
}
.tier-desc {
  font-size: 0.95rem; color: var(--text-on-dark); line-height: 1.6;
}
/* ── HEADLINE ── */
.dash-headline {
  font-family: 'Poppins', sans-serif;
  font-size: 1.15rem; font-weight: 600;
  color: var(--text-on-dark);
  line-height: 1.5;
  margin-bottom: 1.75rem;
  padding: 1.25rem 1.5rem;
  background: rgba(250,210,50,0.06);
  border: 1px solid rgba(250,210,50,0.18);
  border-radius: 12px;
}

/* ── GRID ── */
.dash-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.25rem; }
.dash-card {
  background: var(--grey-card);
  border: 1px solid var(--border-dark);
  border-radius: 12px;
  padding: 1.4rem 1.5rem;
}
.dash-card-label {
  font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 1rem;
}
.dash-card-label.green { color: #4ade80; }
.dash-card-label.red   { color: #f87171; }
.dash-card-label.blue  { color: #60a5fa; }
.dash-card-label.yellow{ color: var(--accent); }

.dash-list { list-style: none; display: flex; flex-direction: column; gap: 0.65rem; }
.dash-list li {
  font-size: 0.9rem; color: var(--text-on-dark); line-height: 1.55;
  padding-left: 1.1rem; position: relative;
}
.dash-list li::before {
  content: '→';
  position: absolute; left: 0;
  font-weight: 700;
}
.dash-list.green li::before { color: #4ade80; }
.dash-list.red   li::before { color: #f87171; }

/* ── NEXT STEP ── */
.dash-next {
  background: var(--grey-card);
  border: 1px solid rgba(250,210,50,0.2);
  border-radius: 12px; padding: 1.4rem 1.5rem;
  margin-bottom: 1.25rem;
}
.dash-next p { font-size: 0.97rem; color: var(--text-on-dark); line-height: 1.7; }

/* ── TECH STACK ── */
.dash-tech { margin-bottom: 1.75rem; }
.dash-tech-badges { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
.tech-badge {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border-dark);
  border-radius: 5px;
  padding: 0.3rem 0.7rem;
  font-size: 0.8rem; color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
}

/* ── DIMENSION SCORES ── */
.dash-dimensions {
  background: var(--grey-card);
  border: 1px solid var(--border-dark);
  border-radius: 12px;
  padding: 1.4rem 1.5rem;
  margin-bottom: 1.25rem;
}
.dim-row {
  display: grid;
  grid-template-columns: 11rem 1fr 2.5rem;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1rem;
}
.dim-row:last-child { margin-bottom: 0; }
.dim-name {
  font-size: 0.82rem; font-weight: 600;
  color: var(--text-on-dark);
  white-space: nowrap;
}
.dim-bar-wrap {
  background: rgba(255,255,255,0.06);
  border-radius: 100px;
  height: 6px;
  overflow: hidden;
}
.dim-bar-fill {
  height: 100%;
  border-radius: 100px;
  transition: width 0.6s ease;
}
.dim-score {
  font-size: 0.8rem; font-weight: 700;
  color: var(--text-muted);
  text-align: right;
}
.dim-summary {
  grid-column: 1 / -1;
  font-size: 0.8rem;
  color: var(--text-muted);
  line-height: 1.5;
  margin-top: -0.5rem;
}

/* ── COMPETITORS ── */
.dash-competitors { margin-bottom: 1.75rem; }
.comp-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border-dark);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin-top: 0.75rem;
}
.comp-url {
  font-size: 0.82rem; font-weight: 600;
  color: var(--text-on-dark); margin-bottom: 0.6rem;
}

/* ── TIER SCALE BAR ── */
.tier-scale {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem;
  margin-bottom: 1.75rem;
}
.tier-scale-item {
  background: var(--grey-card); border: 1px solid var(--border-dark);
  border-radius: 8px; padding: 0.75rem 0.85rem; text-align: center;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.tier-scale-item::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--t-color, transparent);
}
.tier-scale-item.active {
  border-color: var(--t-color, var(--accent));
  background: rgba(255,255,255,0.04);
}
.tier-scale-item .t-roman {
  font-family: 'Poppins', sans-serif; font-size: 1.25rem; font-weight: 800;
  color: var(--t-color, var(--text-muted));
}
.tier-scale-item .t-name {
  font-size: 0.72rem; color: var(--text-muted); margin-top: 0.15rem;
  font-weight: 500;
}
.tier-scale-item.active .t-roman { color: var(--t-color); }
.tier-scale-item.active .t-name  { color: var(--text-on-dark); }

/* ── CTA BAND ── */
.dash-cta-band {
  background: linear-gradient(135deg, rgba(250,210,50,0.08) 0%, rgba(250,210,50,0.03) 100%);
  border: 1px solid rgba(250,210,50,0.2);
  border-radius: 16px; padding: 2rem 2rem;
  display: flex; justify-content: space-between; align-items: center;
  gap: 1.5rem; flex-wrap: wrap;
}
.dash-cta-band h3 {
  font-size: 1.1rem; font-weight: 700; color: var(--text-on-dark); margin-bottom: 0.35rem;
}
.dash-cta-band p { font-size: 0.88rem; color: var(--text-muted); line-height: 1.5; max-width: 420px; }
.btn-cta-large {
  background: var(--accent); color: #1E2433;
  font-family: 'Poppins', sans-serif; font-size: 0.9rem; font-weight: 700;
  padding: 0.8rem 1.8rem; border-radius: 8px; border: none; cursor: pointer;
  text-decoration: none; white-space: nowrap; transition: all 0.2s;
  display: inline-block;
}
.btn-cta-large:hover { background: #ffe066; box-shadow: 0 0 24px var(--accent-glow); }

/* ── NEXT STEP SELECTOR (tabs) ── */
.next-step {
  background: linear-gradient(135deg, rgba(250,210,50,0.07) 0%, rgba(250,210,50,0.02) 100%);
  border: 1px solid rgba(250,210,50,0.2);
  border-radius: 16px;
  padding: 2rem 2rem 2.25rem;
}
.next-step-title {
  font-size: 1.35rem; font-weight: 800; color: var(--text-on-dark);
  letter-spacing: -0.02em; margin-bottom: 0.3rem;
}
.next-step-sub {
  font-size: 0.92rem; color: var(--text-muted);
  line-height: 1.55; margin-bottom: 1.4rem; max-width: 560px;
}
.ns-tabs {
  display: inline-flex;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-dark);
  border-radius: 100px;
  padding: 4px;
  margin-bottom: 1.5rem;
  flex-wrap: wrap; gap: 4px;
}
.ns-tab {
  background: transparent; border: none; cursor: pointer;
  color: var(--text-muted);
  font-family: 'Poppins', sans-serif;
  font-size: 0.82rem; font-weight: 600;
  padding: 0.55rem 1.2rem; border-radius: 100px;
  transition: background 0.2s, color 0.2s;
}
.ns-tab:hover { color: var(--text-on-dark); }
.ns-tab.active { background: var(--accent); color: #1E2433; }
.ns-pane { display: none; animation: ns-fade 0.25s ease; }
.ns-pane.active { display: block; }
@keyframes ns-fade {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.ns-pane-head {
  display: flex; flex-wrap: wrap; align-items: baseline;
  gap: 0.6rem 1rem; margin-bottom: 0.6rem;
}
.ns-pane-head h3 {
  font-size: 1.3rem; font-weight: 800; color: var(--text-on-dark);
  letter-spacing: -0.02em;
}
.ns-price {
  font-size: 1.05rem; font-weight: 800; color: var(--accent);
  letter-spacing: -0.01em;
}
.ns-desc {
  font-size: 0.9rem; color: var(--text-on-dark);
  line-height: 1.65; margin-bottom: 1.25rem;
}
.ns-label {
  font-family: 'Poppins', sans-serif;
  font-size: 0.7rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 0.75rem; margin-top: 1.25rem;
}
.ns-steps { display: flex; flex-wrap: wrap; gap: 0.6rem; }
.ns-step {
  flex: 1 1 200px; min-width: 0;
  display: flex; align-items: center; gap: 0.65rem;
  font-size: 0.83rem; color: var(--text-on-dark); line-height: 1.4;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border-dark);
  border-radius: 10px;
  padding: 0.65rem 0.85rem;
}
.ns-step span {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent); color: #1E2433;
  font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 0.78rem;
  flex-shrink: 0;
}
.ns-gains { list-style: none; padding: 0; margin: 0 0 1.25rem 0; }
.ns-gains li {
  position: relative; padding-left: 1.3rem;
  font-size: 0.88rem; color: var(--text-on-dark); line-height: 1.55;
  margin-bottom: 0.4rem;
}
.ns-gains li::before {
  content: ""; position: absolute; left: 0; top: 0.55rem;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
}
.ns-features {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 0.7rem; margin-bottom: 1.25rem;
}
.ns-fcard {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border-dark);
  border-radius: 10px;
  padding: 0.8rem 0.95rem;
  display: flex; flex-direction: column; gap: 0.3rem;
}
.ns-fcard strong {
  font-family: 'Poppins', sans-serif;
  font-size: 0.85rem; font-weight: 700;
  color: var(--text-on-dark); letter-spacing: -0.01em;
}
.ns-fcard span { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; }
@media (max-width: 600px) {
  .next-step { padding: 1.5rem 1.25rem; }
  .ns-step { flex: 1 1 100%; }
}

/* ── FOOTER ── */
.dash-footer {
  margin-top: 3rem; padding-top: 1.5rem;
  border-top: 1px solid var(--border-dark);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 0.75rem;
  font-size: 0.78rem; color: var(--text-muted);
}
.dash-footer a { color: var(--text-muted); text-decoration: none; }
.dash-footer a:hover { color: var(--accent); }

/* ── ERROR STATE ── */
.error-state {
  text-align: center; padding: 5rem 2rem;
}
.error-state h2 { color: var(--text-on-dark); font-size: 1.4rem; margin-bottom: 1rem; }
.error-state p  { color: var(--text-muted); margin-bottom: 2rem; }

/* ── SHARE TOAST ── */
.share-toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: var(--grey-mid); border: 1px solid var(--border-dark);
  border-radius: 8px; padding: 0.7rem 1.5rem;
  font-size: 0.88rem; color: var(--text-on-dark);
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.share-toast.show { opacity: 1; }

@media (max-width: 640px) {
  .dash-grid-2    { grid-template-columns: 1fr; }
  .tier-scale     { grid-template-columns: repeat(2, 1fr); }
  .dash-top       { grid-template-columns: 1fr; }
  .dash-cta-band  { flex-direction: column; align-items: flex-start; }
  .tier-numeral   { font-size: 3rem; }
}
</style>

<script>
const TIER_CONFIG = {
  'I':  { color: '#f87171', glow: 'rgba(248,113,113,0.2)', label: 'Digital Infant',  sub: 'Úroveň 1 ze 4', range: '0–25',   desc: 'Základní online přítomnost, data se systematicky nesebírají, komunikace probíhá ad hoc.' },
  'II': { color: '#fbbf24', glow: 'rgba(251,191,36,0.2)',  label: 'Digital Aware',   sub: 'Úroveň 2 ze 4', range: '26–50',  desc: 'Nástroje existují, ale jsou odpojené nebo nevyužité. Email funguje, personalizace je minimální.' },
  'III':{ color: '#4ade80', glow: 'rgba(74,222,128,0.2)',  label: 'Digital Active',  sub: 'Úroveň 3 ze 4', range: '51–75',  desc: 'Propojený stack, základní automatizace, data se sbírají systematicky.' },
  'IV': { color: '#60a5fa', glow: 'rgba(96,165,250,0.2)',  label: 'Digital Mature',  sub: 'Úroveň 4 ze 4', range: '76–100', desc: 'Personalizace ve škále, omnichannel přítomnost, data jako základ rozhodování.' },
};

async function compressToB64(str) {
  const bytes = new TextEncoder().encode(str);
  const cs = new CompressionStream('deflate-raw');
  const w = cs.writable.getWriter();
  w.write(bytes); w.close();
  const buf = await new Response(cs.readable).arrayBuffer();
  const arr = new Uint8Array(buf);
  let bin = ''; for (let i = 0; i < arr.length; i++) bin += String.fromCharCode(arr[i]);
  return btoa(bin);
}

async function decompressFromB64(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  const ds = new DecompressionStream('deflate-raw');
  const w = ds.writable.getWriter();
  w.write(arr); w.close();
  return new TextDecoder().decode(await new Response(ds.readable).arrayBuffer());
}

async function decodeResult() {
  // 1. Fresh result from same-tab form submission
  try {
    const stored = sessionStorage.getItem('dmt_result');
    if (stored) return JSON.parse(stored);
  } catch(e) {}
  const params = new URLSearchParams(window.location.search);
  // 2. ?r2= compressed (new format)
  const r2 = params.get('r2');
  if (r2) {
    try { return JSON.parse(await decompressFromB64(decodeURIComponent(r2))); } catch(e) {}
  }
  // 3. ?r= legacy uncompressed (backward compat)
  const r = params.get('r');
  if (!r) return null;
  try { return JSON.parse(decodeURIComponent(escape(atob(r)))); } catch(e) { return null; }
}

const DIMENSION_LABELS = {
  consent_capture:  'Sběr kontaktů',
  email_automation: 'Email & automatizace',
  personalization:  'Personalizace',
  data_integration: 'Data & integrace',
  measurement:      'Měření & KPI',
};

function dimColor(score) {
  if (score >= 70) return '#4ade80';
  if (score >= 45) return '#fbbf24';
  return '#f87171';
}

function renderDashboard(data) {
  const tier = (data.tier || 'II').trim().toUpperCase();
  const cfg = TIER_CONFIG[tier] || TIER_CONFIG['II'];
  const score = data.score_estimate || '?';
  const tools = data.tech_detected || [];
  const strengths = data.strengths_cs || [];
  const gaps = data.opportunities_cs || data.gaps_cs || [];
  const url = data.url_scanned || data.url || '';
  const nextStep = data.next_step_cs || '';
  const headline = data.headline_cs || '';
  const dimensions = data.dimensions || null;
  const competitors = data.competitors || [];
  const logUrl = window.location.href.replace('dashboard.html', 'log.html');
  const now = new Date().toLocaleDateString('cs-CZ', { day:'numeric', month:'long', year:'numeric' });

  // Set tier CSS variables
  document.documentElement.style.setProperty('--tier-color', cfg.color);
  document.documentElement.style.setProperty('--tier-glow', cfg.glow);

  // Tier scale
  const scaleHTML = Object.entries(TIER_CONFIG).map(([t, c]) => `
    <div class="tier-scale-item ${t === tier ? 'active' : ''}" style="--t-color:${c.color}">
      <div class="t-roman">${t}</div>
      <div class="t-name">${c.label}</div>
    </div>`).join('');

  // Tech badges
  const techHTML = tools.length
    ? `<div class="dash-tech">
        <div class="dash-card-label yellow">Detekované nástroje na webu</div>

function nsSwitch(which, btn) {
  document.querySelectorAll('.ns-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.ns-pane').forEach(p => p.classList.remove('active'));
  const pane = document.getElementById('ns-tab-' + which);
  if (pane) pane.classList.add('active');
}

async function copyLink() {
  const data = await decodeResult();
  if (!data) return;
  const dims = {};
  for (const [k, v] of Object.entries(data.dimensions || {})) {
    dims[k] = { score: v.score, summary: v.summary };
  }
  const slim = {
    tier:             data.tier,
    tier_label:       data.tier_label,
    tier_number:      data.tier_number,
    score_estimate:   data.score_estimate,
    headline_cs:      data.headline_cs,
    dimensions:       dims,
    strengths_cs:     data.strengths_cs,
    opportunities_cs: data.opportunities_cs,
    next_step_cs:     data.next_step_cs,
    url_scanned:      data.url_scanned,
    tech_detected:    (data.tech_detected || []).slice(0, 15),
    competitors:      (data.competitors || []).map(({ url, tier, summary_cs, scan_note, tools }) => ({
      url, tier, summary_cs, scan_note: scan_note || undefined,
      tools: (tools || []).slice(0, 8),
    })),
  };
  const compressed = await compressToB64(JSON.stringify(slim));
  const shareUrl = window.location.origin + window.location.pathname + '?r2=' + encodeURIComponent(compressed);
  navigator.clipboard.writeText(shareUrl).then(() => {
    const toast = document.getElementById('share-toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  });
}

// Init
(async function() {
  const data = await decodeResult();
  if (!data) {
    document.getElementById('dash-loading').style.display = 'none';
    document.getElementById('dash-error').style.display = 'block';
  } else {
    renderDashboard(data);
  }
})();
</script>
</body>
</html>
